<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 180" width="280" height="180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1d24"/>
      <stop offset="100%" stop-color="#16191f"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="bar5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="280" height="180" rx="10" fill="url(#bg)"/>
  <rect width="280" height="180" rx="10" fill="none" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="280" height="28" rx="10" fill="#111318"/>
  <rect x="0" y="18" width="280" height="10" fill="#111318"/>
  <!-- dots -->
  <circle cx="14" cy="14" r="3.5" fill="#f87171"/>
  <circle cx="25" cy="14" r="3.5" fill="#fbbf24"/>
  <circle cx="36" cy="14" r="3.5" fill="#34d399"/>
  <!-- title -->
  <text x="52" y="18" font-family="monospace" font-size="8" fill="#9ca3af" letter-spacing="1">XLA DASHBOARD v4</text>
  <!-- month pill -->
  <rect x="215" y="7" width="52" height="14" rx="7" fill="rgba(139,92,246,0.2)" stroke="rgba(139,92,246,0.4)" stroke-width="0.8"/>
  <text x="241" y="17" font-family="monospace" font-size="7" fill="#8b5cf6" text-anchor="middle">JAN 2025</text>

  <!-- Score ring (big) -->
  <circle cx="54" cy="82" r="30" fill="none" stroke="#1f2330" stroke-width="7"/>
  <circle cx="54" cy="82" r="30" fill="none" stroke="url(#bar1)" stroke-width="7"
    stroke-dasharray="141.3" stroke-dashoffset="28" stroke-linecap="round" transform="rotate(-90,54,82)"/>
  <text x="54" y="78" font-family="Arial,sans-serif" font-size="12" font-weight="900" fill="#f4f4f6" text-anchor="middle">8.2</text>
  <text x="54" y="89" font-family="monospace" font-size="6" fill="#9ca3af" text-anchor="middle">OVERALL XLA</text>

  <!-- 5 pillar bars -->
  <text x="100" y="44" font-family="monospace" font-size="6.5" fill="#9ca3af">EXPERIENCE PILLARS</text>

  <!-- Pillar rows -->
  <text x="100" y="59" font-family="monospace" font-size="6" fill="#9ca3af">SPEED</text>
  <rect x="140" y="52" width="120" height="7" rx="3.5" fill="#16191f"/>
  <rect x="140" y="52" width="96" height="7" rx="3.5" fill="url(#bar1)"/>
  <text x="264" y="59" font-family="monospace" font-size="6" fill="#8b5cf6" text-anchor="end">8.0</text>

  <text x="100" y="74" font-family="monospace" font-size="6" fill="#9ca3af">QUALITY</text>
  <rect x="140" y="67" width="120" height="7" rx="3.5" fill="#16191f"/>
  <rect x="140" y="67" width="108" height="7" rx="3.5" fill="url(#bar2)"/>
  <text x="264" y="74" font-family="monospace" font-size="6" fill="#22d3ee" text-anchor="end">9.0</text>

  <text x="100" y="89" font-family="monospace" font-size="6" fill="#9ca3af">EMPATHY</text>
  <rect x="140" y="82" width="120" height="7" rx="3.5" fill="#16191f"/>
  <rect x="140" y="82" width="84" height="7" rx="3.5" fill="url(#bar3)"/>
  <text x="264" y="89" font-family="monospace" font-size="6" fill="#fb923c" text-anchor="end">7.0</text>

  <text x="100" y="104" font-family="monospace" font-size="6" fill="#9ca3af">OUTCOMES</text>
  <rect x="140" y="97" width="120" height="7" rx="3.5" fill="#16191f"/>
  <rect x="140" y="97" width="100" height="7" rx="3.5" fill="url(#bar4)"/>
  <text x="264" y="104" font-family="monospace" font-size="6" fill="#34d399" text-anchor="end">8.3</text>

  <text x="100" y="119" font-family="monospace" font-size="6" fill="#9ca3af">EFFORT</text>
  <rect x="140" y="112" width="120" height="7" rx="3.5" fill="#16191f"/>
  <rect x="140" y="112" width="88" height="7" rx="3.5" fill="url(#bar5)"/>
  <text x="264" y="119" font-family="monospace" font-size="6" fill="#f472b6" text-anchor="end">7.3</text>

  <!-- Divider -->
  <line x1="12" y1="133" x2="268" y2="133" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Framework badges -->
  <text x="14" y="147" font-family="monospace" font-size="6" fill="#4b5563">VALIDATED AGAINST</text>
  <rect x="14" y="151" width="38" height="14" rx="4" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.3)" stroke-width="0.7"/>
  <text x="33" y="161" font-family="monospace" font-size="6" fill="#8b5cf6" text-anchor="middle">GARTNER</text>
  <rect x="58" y="151" width="38" height="14" rx="4" fill="rgba(34,211,238,0.1)" stroke="rgba(34,211,238,0.3)" stroke-width="0.7"/>
  <text x="77" y="161" font-family="monospace" font-size="6" fill="#22d3ee" text-anchor="middle">NEXTHINK</text>
  <rect x="102" y="151" width="48" height="14" rx="4" fill="rgba(251,146,60,0.1)" stroke="rgba(251,146,60,0.3)" stroke-width="0.7"/>
  <text x="126" y="161" font-family="monospace" font-size="6" fill="#fb923c" text-anchor="middle">HAPPYSIGNALS</text>
  <rect x="156" y="151" width="22" height="14" rx="4" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.3)" stroke-width="0.7"/>
  <text x="167" y="161" font-family="monospace" font-size="6" fill="#8b5cf6" text-anchor="middle">IBM</text>
  <rect x="184" y="151" width="36" height="14" rx="4" fill="rgba(34,211,238,0.1)" stroke="rgba(34,211,238,0.3)" stroke-width="0.7"/>
  <text x="202" y="161" font-family="monospace" font-size="6" fill="#22d3ee" text-anchor="middle">XLA INST.</text>

  <!-- Export buttons -->
  <rect x="224" y="151" width="42" height="14" rx="4" fill="rgba(139,92,246,0.85)"/>
  <text x="245" y="161" font-family="monospace" font-size="6" fill="#fff" text-anchor="middle">⬇ EXPORT</text>
</svg>
